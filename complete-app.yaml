apiVersion: v1
kind: LimitRange
metadata:
  name: dev-limit-range
spec:
  limits:
    - type: Container
      min:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "1"
        memory: 1Gi
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 200m
        memory: 256Mi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: banking-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: banking-app
    spec:
      containers:
        - name: banking-container
          image: 796796207873.dkr.ecr.ap-south-1.amazonaws.com/banking-5:latest
          ports:
            - containerPort: 5000

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: banking-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: banking-deployment
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
apiVersion: v1
kind: Service
metadata:
  name: banking-service
spec:
  type: LoadBalancer
  selector:
    app: banking-app
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000

---
apiVersion: v1
kind: Service
metadata:
  name: banking-headless
spec:
  clusterIP: None
  selector:
    app: banking-app
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: monitoring-agent
spec:
  selector:
    matchLabels:
      app: monitoring-agent
  template:
    metadata:
      labels:
        app: monitoring-agent
    spec:
      nodeSelector:
        monitor: "true"
      containers:
        - name: node-exporter
          image: prom/node-exporter:latest
          ports:
            - containerPort: 9100

---
apiVersion: v1
kind: Service
metadata:
  name: banking-stateful-headless
spec:
  clusterIP: None
  selector:
    app: banking-stateful
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: banking-stateful
spec:
  serviceName: banking-stateful-headless
  replicas: 3
  selector:
    matchLabels:
      app: banking-stateful
  template:
    metadata:
      labels:
        app: banking-stateful
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: banking-container
          image: 796796207873.dkr.ecr.ap-south-1.amazonaws.com/banking-5:latest
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: banking-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: banking-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp2
        resources:
          requests:
            storage: 5Gi

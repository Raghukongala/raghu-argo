replicaCount: 3

serviceAccount:
  create: false
  automount: false
  annotations: {}

image:
  repository: 796796207873.dkr.ecr.ap-south-1.amazonaws.com/banking-5
  tag: latest
  pullPolicy: IfNotPresent

deploymentName: banking-deployment

containerPort: 5000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

service:
  name: banking-service
  type: NodePort
  port: 5000
  nodePort: 30080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

httpRoute:
  enabled: false
  annotations: {}
  parentRefs: []
  hostnames: []
  rules: []

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80
